name: Screenshot agent image

on:
  push:
    branches:
      - main
    paths:
      - capture-agent/**
      - shared/utils/hn.ts
      - shared/utils/screenshot.ts
      - shared/utils/screenshotJobs.ts
      - package.json
      - package-lock.json
      - tsconfig.json
      - .dockerignore
      - .github/workflows/screenshot-agent-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: screenshot-agent-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/valentinvieriu/hn-glance-screenshot-agent
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: capture-agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
