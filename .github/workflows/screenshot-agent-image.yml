name: Screenshot agent image

on:
  push:
    branches:
      - main
    paths:
      - capture-agent/**
      - shared/utils/hn.ts
      - shared/utils/screenshot.ts
      - shared/utils/screenshotJobs.ts
      - package.json
      - package-lock.json
      - tsconfig.json
      - .github/workflows/screenshot-agent-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/valentinvieriu/hn42-screenshot-agent
          tags: |
            type=raw,value=latest
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: capture-agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
